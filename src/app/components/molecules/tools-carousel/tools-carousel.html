<section class="tools-section">
  <div class="container">
    <h2 class="title">Technologies and Tools used</h2>

    <div class="carousel">
      <div class="track">
        @for (brand of duplicatedBrands; track + $index) {
          <app-brand
            [Name]="brand.name"
            [Image]="brand.image"
          />
        }
      </div>
    </div>
  </div>
</section>
